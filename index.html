<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dineth & Ishini - Save The Date</title>
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='white'/%3E%3Ctext y='50' x='6' font-size='50' fill='%23d8a24a'%3E%F0%9F%92%8D%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      position: relative;
    }

    body,
    main {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: grid;
    }

    body {
      /* background: #ffffff; */
      background: radial-gradient(circle at top, #fff6f4 0%, #fff 48%, #f7f2fa 100%);
    }

    svg {
      width: 100vmin;
      height: 100vmin;
      margin: auto;
    }

    main {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
    }

    div {
      background: transparent;
      grid-column: 1 / 2;
      grid-row: 1 / 2;
    }

    main::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(216, 167, 164, 0.18), transparent 60%);
      animation: subtle 9000ms infinite linear;
    }

    path {
      stroke-width: 2px;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 300px;
      animation: dash 10000ms -10000ms infinite alternate ease-in-out,
        w 7200ms -7200ms infinite alternate ease-in-out;
    }

    .heart-stroke {
      stroke: url(#gold-stroke);
      filter: drop-shadow(0 0 12px rgba(232, 186, 89, 0.55));
    }

    .heart-label {
      font-family: "Playfair Display", serif;
      fill: #4b3a63;
      text-shadow: 0 8px 16px rgba(216, 167, 164, 0.2);
    }

    .tap-text {
      position: absolute;
      bottom: 8vh;
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(75, 58, 99, 0.65);
    }

    .tap-text a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem 1.8rem;
      border-radius: 999px;
      border: 1px solid rgba(216, 167, 164, 0.6);
      background: rgba(255, 255, 255, 0.9);
      color: #4b3a63;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 2px;
      box-shadow: 0 12px 24px rgba(216, 167, 164, 0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .tap-text a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(216, 167, 164, 0.35);
    }

    @keyframes dash {
      100% {
        stroke-dashoffset: -298px;
      }
    }

    @keyframes w {
      100% {
        stroke-width: 12px;
      }
    }

    @keyframes subtle {
      100% {
        transform: rotate(1turn);
      }
    }
  </style>
</head>

<body>
  <main>
    <svg width="150" height="150" viewBox="0 0 150 150">
      <defs>
        <linearGradient id="gold-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f7e7b2" />
          <stop offset="35%" stop-color="#f1c86d" />
          <stop offset="60%" stop-color="#e2a93b" />
          <stop offset="85%" stop-color="#f6e2a4" />
          <stop offset="100%" stop-color="#d8a24a" />
        </linearGradient>
      </defs>
      <g transform="translate(100 100)">
        <path class="heart-stroke" transform="translate(-75 -75)" stroke-width="6" fill="none"
          d="M92.71,7.27L92.71,7.27c-9.71-9.69-25.46-9.69-35.18,0L50,14.79l-7.54-7.52C32.75-2.42,17-2.42,7.29,7.27v0 c-9.71,9.69-9.71,25.41,0,35.1L50,85l42.71-42.63C102.43,32.68,102.43,16.96,92.71,7.27z">
        </path>
      </g>
      <text class="heart-label" x="50%" y="42%" text-anchor="middle" dominant-baseline="middle">
        <tspan x="50%" dy="-8" font-size="10" font-weight="700">Dineth &amp; Ishini</tspan>
        <tspan x="50%" dy="18" font-size="6" letter-spacing="2">24.07.2026</tspan>
      </text>
    </svg>
    <div class="tap-text"><a href="invitation.html">Tap to open</a></div>
  </main>
</body>

</html>
